# Koydo Enhanced PyTest Configuration
# Following Koydo testing standards and best practices

[tool:pytest]
# Test discovery
testpaths = ["tests", "tests_koydo"]
python_files = ["test_*.py", "*_test.py", "test*.py"]
python_classes = ["Test*", "*Test", "*Tests"]
python_functions = ["test_*"]

# Test execution
addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=tradingagents
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --cov-branch
    --durations=10
    --maxfail=5
    --disable-warnings

# Markers for test categorization (Koydo standards)
markers =
    unit: fast isolated unit tests (< 1s each)
    integration: tests requiring external services (< 30s each)
    smoke: quick sanity-check tests (< 5s total)
    security: security-focused tests
    performance: performance and load tests
    slow: tests that take longer than 30 seconds
    network: tests requiring network access
    api: tests that call external APIs
    auth: tests related to authentication/authorization
    data: tests related to data processing and validation
    config: tests for configuration management
    llm: tests for LLM integration
    trading: tests for trading logic
    risk: tests for risk management
    portfolio: tests for portfolio management
    memory: tests for memory and persistence
    cli: tests for command line interface
    docker: tests for Docker deployment
    regression: regression tests for known issues

# Test filtering
minversion = "7.0"
required_plugins =
    pytest-cov
    pytest-mock
    pytest-asyncio
    pytest-timeout

# Timeouts (Koydo standards)
timeout = 300
timeout_method = thread

# Coverage configuration
[coverage:run]
source = tradingagents
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    setup.py
    conftest.py

[coverage:report]
# Fail if coverage is below threshold
fail_under = 80
show_missing = true
skip_covered = false
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass

[coverage:html]
directory = htmlcov
title = TradingAgents Coverage Report (Koydo Enhanced)

[coverage:xml]
output = coverage.xml